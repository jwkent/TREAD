backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Structural Engineering"
          - "Home Design"
          - "Remodeling"
          - "Retaining Wall"
          - "Site Assessment"
          - "Feasibility Study"
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Date Completed", name: "date", widget: "datetime" }
      - { label: "Feature on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Project Details (optional)", name: "body", widget: "markdown", required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "name", widget: "string" }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Project Type", name: "projectType", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 99 }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "src/content/settings/main.json"
        fields:
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Subheadline", name: "heroSubheadline", widget: "text" }
          - { label: "About/Bio Text", name: "aboutText", widget: "text" }
          - { label: "Credentials / License Info", name: "credentials", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Service Area", name: "serviceArea", widget: "string" }

      - label: "About Page"
        name: "about"
        file: "src/content/settings/about.json"
        fields:
          - { label: "Page Heading", name: "heroHeading", widget: "string" }
          - { label: "Full Name & Title (e.g. Ben Smith, PE)", name: "name", widget: "string" }
          - { label: "Headshot Photo", name: "photo", widget: "image", required: false }
          - { label: "Lead Bio (italic intro paragraph)", name: "leadBio", widget: "text" }
          - { label: "Bio Paragraph 1", name: "bio1", widget: "text" }
          - { label: "Bio Paragraph 2", name: "bio2", widget: "text" }
          - { label: "PE License Number", name: "licenseNumber", widget: "string" }
          - label: "How Ben Works — Step 1"
            name: "process1Title"
            widget: "string"
          - { label: "Step 1 Description", name: "process1Desc", widget: "text" }
          - { label: "How Ben Works — Step 2", name: "process2Title", widget: "string" }
          - { label: "Step 2 Description", name: "process2Desc", widget: "text" }
          - { label: "How Ben Works — Step 3", name: "process3Title", widget: "string" }
          - { label: "Step 3 Description", name: "process3Desc", widget: "text" }
          - { label: "Value 1 Title", name: "value1Title", widget: "string" }
          - { label: "Value 1 Description", name: "value1Desc", widget: "text" }
          - { label: "Value 2 Title", name: "value2Title", widget: "string" }
          - { label: "Value 2 Description", name: "value2Desc", widget: "text" }
          - { label: "Value 3 Title", name: "value3Title", widget: "string" }
          - { label: "Value 3 Description", name: "value3Desc", widget: "text" }
